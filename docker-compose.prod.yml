services:
  db:
    image: postgres:16-alpine
    container_name: birgefund_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-birgefund}
      POSTGRES_USER: ${POSTGRES_USER:-birgefund}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - birgefund

  redis:
    image: redis:7-alpine
    container_name: birgefund_redis
    restart: unless-stopped
    networks:
      - birgefund

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: birgefund_backend
    restart: unless-stopped
    env_file:
      - .env.prod
    depends_on:
      - db
      - redis
    ports:
      - "127.0.0.1:8001:8000"
    volumes:
      - backend_uploads:/app/storage/uploads
    networks:
      - birgefund

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        VITE_API_BASE_URL: /api
    container_name: birgefund_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "127.0.0.1:3001:80"
    networks:
      - birgefund

volumes:
  postgres_data:
  backend_uploads:

networks:
  birgefund:
    driver: bridge
