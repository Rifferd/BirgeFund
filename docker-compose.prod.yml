services:
  db:
    image: postgres:16-alpine
    container_name: birgefund_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-birgefund}
      POSTGRES_USER: ${POSTGRES_USER:-birgefund}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - birgefund

  redis:
    image: redis:7-alpine
    container_name: birgefund_redis
    restart: unless-stopped
    networks:
      - birgefund

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: birgefund_backend
    restart: unless-stopped
    env_file:
      - .env.prod
    depends_on:
      - db
      - redis
    volumes:
      - backend_uploads:/app/storage/uploads
    networks:
      - birgefund

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        VITE_API_URL: /api
    container_name: birgefund_frontend
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - birgefund

  caddy:
    image: caddy:2-alpine
    container_name: birgefund_caddy
    restart: unless-stopped
    depends_on:
      - frontend
      - backend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - birgefund

volumes:
  postgres_data:
  backend_uploads:
  caddy_data:
  caddy_config:

networks:
  birgefund:
    driver: bridge
