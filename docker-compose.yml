services:
  postgres:
    image: postgres:16-alpine
    container_name: birgefund_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-birgefund}
      POSTGRES_USER: ${POSTGRES_USER:-birgefund}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-birgefund_password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - birgefund_network

  redis:
    image: redis:7-alpine
    container_name: birgefund_redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    networks:
      - birgefund_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: birgefund_backend
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./backend:/app
      - ./storage:/storage
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      - postgres
      - redis
    networks:
      - birgefund_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: birgefund_frontend
    restart: unless-stopped
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    depends_on:
      - backend
    networks:
      - birgefund_network

  nginx:
    image: nginx:1.27-alpine
    container_name: birgefund_nginx
    restart: unless-stopped
    ports:
      - "${NGINX_PORT:-8080}:80"
    volumes:
      - ./infra/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend
    networks:
      - birgefund_network

volumes:
  postgres_data:

networks:
  birgefund_network:
    driver: bridge
